# Documentation: https://rmk.rs/docs/configuration.html
[keyboard]
name = "KeyboardN"
product_name = "KeyboardName"
serial_number = "vial:f64c2b3c"
usb_enable = true
vendor_id = 0x4c4b
product_id = 0x4643
manufacturer = "NRF"
chip = "nrf52840"

[matrix]
matrix_type = "direct_pin"

# 2D array representing your direct-pin matrix
direct_pins = [
    ["P0_17","P0_20","P0_22","P0_24","P1_00","P0_11"],
    ["P0_31","P0_29","P0_02","P1_15","P1_13","P1_11"]
]

# Pin behavior (default: true = active low with pull-up)
direct_pin_low_active = true

[layout]
rows = 2
cols = 5
layers = 2
# Encoder 0
[[input_device.encoder]]
pin_a = "P1_04"
pin_b = "P1_06"
phase = "default"
