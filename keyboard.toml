# Documentation: https://rmk.rs/docs/configuration.html
[keyboard]
name = "RMK Keyboard"
product_name = "RMK Keyboard"
vendor_id = 0x4c4b
product_id = 0x4643
manufacturer = "RMK"
chip = "rp2040"

[matrix]
matrix_type = "direct_pin"

# 2D array representing your direct-pin matrix
direct_pins = [
    ["PIN_1","_","_"],
    ["_","PIN_2","PIN_3"],
    ["PIN_4","PIN_5","PIN_6"],
    ["PIN_7","PIN_8","PIN_9"],
    ["PIN_10","PIN_11","PIN_12"],
    ["PIN_13","PIN_14","PIN_15"],
]

# Pin behavior (default: true = active low with pull-up)
direct_pin_low_active = true

# Encoder 0
[[input_device.encoder]]
pin_a = "PIN_17"
pin_b = "PIN_18"
phase = "resolution"
resolution = 2
internal_pullup = true

# Encoder 1
[[input_device.encoder]]
pin_a = "PIN_19"
pin_b = "PIN_20"
phase = "resolution"
resolution = 2
internal_pullup = true

[layout]
rows = 6
cols = 3
layers = 2
keymap = [
    [
        ["A", "_", "_"],
        ["_", "B", "C"],
        ["D", "E", "F"],
        ["G", "H", "I"],
        ["J", "K", "L"],
        ["N", "M", "O"]
    ],
    [
        ["_", "_", "_"],
        ["_", "_", "_"],
        ["_", "_", "_"],
        ["_", "_", "_"],
        ["_", "_", "_"],
        ["_", "_", "_"]
    ]
]
